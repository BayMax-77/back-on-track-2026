<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside id="sidebar">
        <div id="sidebar-header">
            <button id="hamburger" title="Toggle sidebar">
                <span class="h-line"></span>
                <span class="h-line"></span>
                <span class="h-line"></span>
            </button>
            <span class="app-label">Notes</span>
        </div>

        <div id="notes-list">
            <!-- Las note-cards se generan aquí dinámicamente con JS -->
        </div>

        <div id="sidebar-footer">
            <button id="add-btn">+ New Note</button>
            <div id="io-buttons">
                <button id="export-btn">Export</button>
                <label id="import-label">
                    Import
                    <input type="file" id="import-input" accept=".json" hidden>
                </label>
            </div>
        </div>
    </aside>

    <main id="editor">
        <div id="empty-state">
            <p>← Select a note or create a new one</p>
        </div>
        <div id="note-editor" class="hidden">
            <input type="text" id="note-title" placeholder="Title...">
            <textarea id="note-content" placeholder="Start writing..."></textarea>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
